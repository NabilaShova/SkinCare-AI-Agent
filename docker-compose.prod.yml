services:
  postgres:
    image: pgvector/pgvector:pg15
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-support_agent}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-support_agent}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-support_agent}
      OPENAI_API_KEY: ${OPENAI_API_KEY:?Set OPENAI_API_KEY}
      OPENAI_CHAT_MODEL: ${OPENAI_CHAT_MODEL:-gpt-4o}
      OPENAI_INTENT_MODEL: ${OPENAI_INTENT_MODEL:-gpt-4o-mini}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      OPENAI_TEMPERATURE: ${OPENAI_TEMPERATURE:-0.3}
      BACKEND_PUBLIC_URL: ${BACKEND_PUBLIC_URL:?Set BACKEND_PUBLIC_URL}
      FRONTEND_PUBLIC_URL: ${FRONTEND_PUBLIC_URL:?Set FRONTEND_PUBLIC_URL}
      SHOPIFY_APP_URL: ${SHOPIFY_APP_URL:?Set SHOPIFY_APP_URL}
      SHOPIFY_API_KEY: ${SHOPIFY_API_KEY:?Set SHOPIFY_API_KEY}
      SHOPIFY_API_SECRET: ${SHOPIFY_API_SECRET:?Set SHOPIFY_API_SECRET}
      SHOPIFY_API_VERSION: ${SHOPIFY_API_VERSION:-2024-10}
      ADMIN_API_KEY: ${ADMIN_API_KEY:?Set ADMIN_API_KEY}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET}
      ENVIRONMENT: production
      CORS_ORIGINS: ${CORS_ORIGINS:?Set CORS_ORIGINS}
      SEED_DEMO_DATA: ${SEED_DEMO_DATA:-false}
      DEMO_STORE_ID: ${DEMO_STORE_ID:-1}
      RATE_LIMIT_CHAT_PER_MINUTE: ${RATE_LIMIT_CHAT_PER_MINUTE:-30}
      RATE_LIMIT_ADMIN_PER_MINUTE: ${RATE_LIMIT_ADMIN_PER_MINUTE:-120}
      RAG_TOP_K: ${RAG_TOP_K:-5}
      RAG_MIN_SCORE: ${RAG_MIN_SCORE:-0.12}
      PRODUCT_TOP_K: ${PRODUCT_TOP_K:-5}
      CHAT_HISTORY_LIMIT: ${CHAT_HISTORY_LIMIT:-12}
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?Set NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_SHOPIFY_APP_URL: ${FRONTEND_PUBLIC_URL:?Set FRONTEND_PUBLIC_URL}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  postgres-data:
