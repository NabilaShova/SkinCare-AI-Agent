services:
  postgres:
    image: pgvector/pgvector:pg15
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: support_agent
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d support_agent"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/support_agent
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_CHAT_MODEL: ${OPENAI_CHAT_MODEL:-gpt-4o-mini}
      OPENAI_INTENT_MODEL: ${OPENAI_INTENT_MODEL:-gpt-4o-mini}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      OPENAI_TEMPERATURE: ${OPENAI_TEMPERATURE:-0.3}
      RAG_TOP_K: ${RAG_TOP_K:-5}
      RAG_MIN_SCORE: ${RAG_MIN_SCORE:-0.12}
      PRODUCT_TOP_K: ${PRODUCT_TOP_K:-5}
      CHAT_HISTORY_LIMIT: ${CHAT_HISTORY_LIMIT:-12}
      SHOPIFY_APP_URL: ${SHOPIFY_APP_URL:-http://localhost:3000}
      SHOPIFY_API_KEY: ${SHOPIFY_API_KEY:-}
      SHOPIFY_API_SECRET: ${SHOPIFY_API_SECRET:-}
      BACKEND_PUBLIC_URL: ${BACKEND_PUBLIC_URL:-http://localhost:8000}
      FRONTEND_PUBLIC_URL: ${FRONTEND_PUBLIC_URL:-http://localhost:3000}
      ADMIN_API_KEY: ${ADMIN_API_KEY:-dev-admin-key-change-me}
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-me}
      SEED_DEMO_DATA: ${SEED_DEMO_DATA:-true}
      DEMO_STORE_ID: ${DEMO_STORE_ID:-1}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      ENVIRONMENT: ${ENVIRONMENT:-development}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    command: sh -c "npm install --legacy-peer-deps && npm run dev -- -H 0.0.0.0"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_SHOPIFY_APP_URL: ${SHOPIFY_APP_URL:-http://localhost:3000}
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/usr/src/app
      - frontend-node-modules:/usr/src/app/node_modules
    depends_on:
      - backend

volumes:
  postgres-data:
  frontend-node-modules:
