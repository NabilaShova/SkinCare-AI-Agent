# Render Blueprint — deploy via Dashboard: New > Blueprint > connect this repo
# Repo: https://github.com/NabilaShova/SkinCare-AI-Agent

databases:
  - name: skincare-db
    plan: basic-256mb
    databaseName: support_agent
    user: support_agent
    postgresMajorVersion: "15"
    ipAllowList: []

services:
  - type: web
    name: skincare-api
    runtime: docker
    plan: starter
    dockerfilePath: ./backend/Dockerfile.prod
    dockerContext: ./backend
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: skincare-db
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_CHAT_MODEL
        value: gpt-4o
      - key: OPENAI_INTENT_MODEL
        value: gpt-4o-mini
      - key: OPENAI_EMBEDDING_MODEL
        value: text-embedding-3-small
      - key: SHOPIFY_API_KEY
        sync: false
      - key: SHOPIFY_API_SECRET
        sync: false
      - key: SHOPIFY_APP_URL
        sync: false
      - key: SHOPIFY_API_VERSION
        value: "2024-10"
      - key: SHOPIFY_SCOPES
        value: read_products,read_orders,read_customers,read_content
      - key: BACKEND_PUBLIC_URL
        sync: false
      - key: FRONTEND_PUBLIC_URL
        sync: false
      - key: ADMIN_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: SEED_DEMO_DATA
        value: "false"
      - key: CORS_ORIGINS
        sync: false
      - key: RATE_LIMIT_CHAT_PER_MINUTE
        value: "30"
      - key: RATE_LIMIT_ADMIN_PER_MINUTE
        value: "120"

  - type: web
    name: skincare-frontend
    runtime: node
    plan: starter
    rootDir: frontend
    buildCommand: npm install --legacy-peer-deps && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        sync: false
      - key: NEXT_PUBLIC_SHOPIFY_APP_URL
        sync: false
      - key: NODE_VERSION
        value: "20"
